<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP-Energy | Dashboard de Gráficas</title>
    <link rel="stylesheet" href="style.css"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Solo los estilos necesarios para el nuevo menú lateral de esta página */
        .dashboard-container { display: flex; gap: 20px; margin-top: 30px; align-items: flex-start; }
        .sidebar-graficas { flex: 0 0 250px; background: #222; padding: 20px; border-radius: 10px; position: sticky; top: 20px; }
        .sidebar-btn { width: 100%; background: none; border: none; color: #ccc; padding: 12px; text-align: left; cursor: pointer; border-bottom: 1px solid #333; transition: 0.3s; }
        .sidebar-btn.active { color: #FFD700; font-weight: bold; border-left: 4px solid #FFD700; background: rgba(255,215,0,0.1); }
        .main-content { flex: 1; min-width: 0; }
        .graph-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .dynamic-section { display: none; }
        .dynamic-section.active { display: block; }
        .chart-container { height: 400px; position: relative; }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="mapa.html">Mapa</a></li>
            <li><a href="graficas.html" class="active">Gráficas</a></li>
            <li><a href="emisiones.html">Emisiones</a></li>
            <li><a href="info.html">Contacto</a></li>
        </ul>
    </nav>

    <main class="main-container" style="max-width: 1400px; margin: 0 auto; padding: 20px;">
        
        <section class="graph-card">
            <h2 style="border-bottom: 2px solid #FFD700; padding-bottom: 10px;">Capacidad y Generación Solar (2010-2024)</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="chart-container"><canvas id="staticCap"></canvas></div>
                <div class="chart-container"><canvas id="staticGen"></canvas></div>
            </div>
        </section>

        <div class="dashboard-container">
            <aside class="sidebar-graficas">
                <h3 style="color: #FFD700; font-size: 0.9rem; margin-bottom: 15px;">FILTRAR ANÁLISIS</h3>
                <button class="sidebar-btn active" onclick="tab(this, 'sec-factor')">Factor de Planta</button>
                <button class="sidebar-btn" onclick="tab(this, 'sec-gd')">Generación Distribuida</button>
                <button class="sidebar-btn" onclick="tab(this, 'sec-reg')">Series Regionales</button>
            </aside>

            <div class="main-content">
                <section id="sec-factor" class="dynamic-section active">
                    <div class="graph-card">
                        <h3>Factor de Planta FV por Región (%)</h3>
                        <div class="chart-container"><canvas id="chartFactorReg"></canvas></div>
                    </div>
                </section>

                <section id="sec-gd" class="dynamic-section">
                    <div class="graph-card">
                        <h3>Evolución Generación Distribuida (MW)</h3>
                        <div class="chart-container"><canvas id="chartGD"></canvas></div>
                    </div>
                </section>

                <section id="sec-reg" class="dynamic-section">
                    <div class="graph-card">
                        <h3>Datos por Región</h3>
                        <select id="regSel" onchange="updateReg()" style="margin-bottom: 15px; padding: 8px;">
                            <option value="CEN">CEN</option>
                            <option value="ORI">ORI</option>
                            <option value="NTE">NTE</option>
                        </select>
                        <div class="chart-container"><canvas id="chartReg"></canvas></div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        const years = [2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];
        let charts = {};

        function tab(btn, id) {
            document.querySelectorAll('.dynamic-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = () => {
            // Solares fijas
            new Chart(document.getElementById('staticCap'), { type: 'line', data: { labels: years, datasets: [{ label: 'MW Solar', data: [0,0,1,11,55,57,145,171,1878,3646,5149,5955,6515,7437,7961], borderColor: '#FFD700', fill: true, backgroundColor: 'rgba(255,215,0,0.1)' }] }, options: { maintainAspectRatio: false } });
            new Chart(document.getElementById('staticGen'), { type: 'line', data: { labels: years, datasets: [{ label: 'GWh Solar', data: [0,0,3,20,83,45,151,349,2176,8394,13528,17069,16290,18210,18640], borderColor: '#FFA500' }] }, options: { maintainAspectRatio: false } });

            // Factor FV Región (Excel)
            new Chart(document.getElementById('chartFactorReg'), { type: 'bar', data: { labels: ['BCA','BCS','CEN','NES','NOR','NTE','OCC','ORI','PEN'], datasets: [{ label: '% Eficiencia', data: [20, 19.5, 19, 6, 19.5, 20.6, 19.75, 18.2, 17.33], backgroundColor: '#4CAF50' }] }, options: { maintainAspectRatio: false } });

            // GD (Excel)
            new Chart(document.getElementById('chartGD'), { type: 'line', data: { labels: years, datasets: [{ label: 'MW Instalados', data: [0.81, 4.66, 14.86, 29.13, 61.87, 117.53, 247.59, 459.25, 692.8, 1083.39, 1551.09, 2031.24, 2629.78, 3361.69, 4447.92], borderColor: '#2196F3', fill: true, backgroundColor: 'rgba(33,150,243,0.1)' }] }, options: { maintainAspectRatio: false } });

            updateReg();
        };

        function updateReg() {
            const r = document.getElementById('regSel').value;
            const data = r === 'CEN' ? [9004,8844,8651,8411,8192,8151,8567,8705,8805,8754,8717,8450,8466,8619,8848] : [6356,6577,6626,6709,6767,6960,7128,7299,7594,7923,7461,7868,8203,8783,9034];
            if(charts.reg) charts.reg.destroy();
            charts.reg = new Chart(document.getElementById('chartReg'), { type: 'line', data: { labels: years, datasets: [{ label: 'Demanda (MW)', data: data, borderColor: '#FF5722' }] }, options: { maintainAspectRatio: false } });
        }
    </script>
</body>
</html>
