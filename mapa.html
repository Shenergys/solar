<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SP-Energy | Plataforma SIG Energética</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure@3.1.0/dist/leaflet-measure.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-measure@3.1.0/dist/leaflet-measure.min.js"></script>

<style>

body{
margin:0;
font-family:Roboto;
}

#map{
position:absolute;
top:60px;
bottom:0;
right:0;
left:300px;
}

header{
height:60px;
background:#111;
color:white;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:3px solid #f4c542;
}

#sidebar{

position:absolute;
top:60px;
left:0;
bottom:0;
width:300px;
background:white;
border-right:1px solid #ddd;
padding:15px;
overflow:auto;

}

.layer{
margin-bottom:8px;
}

.legend{

position:absolute;
bottom:20px;
right:20px;
background:white;
padding:10px;
border-radius:5px;
box-shadow:0 2px 8px rgba(0,0,0,.3);

}

.gradient{

width:200px;
height:10px;
background:linear-gradient(to right, #313695,#4575b4,#74add1,#abd9e9,#e0f3f8,#ffffbf,#fee090,#fdae61,#f46d43,#d73027,#a50026);

}

</style>

</head>

<body>

<header>
SP-ENERGY ☀ Plataforma SIG
</header>

<div id="sidebar">

<h3>Capas</h3>

<div class="layer">
<input type="checkbox" onclick="loadRaster('ghi','GHI_FINAL.tif')">
Radiación solar
</div>

<div class="layer">
<input type="checkbox" onclick="loadRaster('pv','PV_FINAL.tif')">
Potencial FV
</div>

<div class="layer">
<input type="checkbox" onclick="loadRaster('temp','TEMP.tif')">
Temperatura
</div>

<hr>

<div class="layer">
<input type="checkbox" onclick="loadVector('regiones','mis_9_regiones.json')">
Regiones
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('lineas','lineas_transmision_cfe_24.json')">
Líneas transmisión
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('sub','subestaciones_cfe.json')">
Subestaciones
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('anp','232_ANP-ITRF08_04072025.json')">
ANP
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('hidro','hidro4mgw.json')">
Hidrología
</div>

</div>

<div id="map"></div>

<div class="legend">

<b>Escala</b>

<div class="gradient"></div>

</div>

<script>

const map=L.map('map').setView([23,-102],5)

const osm=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

const carto=L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
)

L.control.layers({

"OSM":osm,
"Carto":carto

}).addTo(map)

L.control.scale().addTo(map)

L.control.measure({
primaryLengthUnit:'kilometers',
primaryAreaUnit:'sqkilometers'
}).addTo(map)

const layers={}

function colorScale(v,min,max){

let r=(v-min)/(max-min)

let red=Math.floor(255*r)
let blue=Math.floor(255*(1-r))

return `rgb(${red},80,${blue})`

}

async function loadRaster(id,file){

if(layers[id]){

map.removeLayer(layers[id])
delete layers[id]
return

}

let res=await fetch("datos/"+file)

let buf=await res.arrayBuffer()

let raster=await parseGeoraster(buf)

let min=raster.mins[0]
let max=raster.maxs[0]

layers[id]=new GeoRasterLayer({

georaster:raster,
opacity:0.7,
resolution:256,

pixelValuesToColorFn:function(pixel){

let v=pixel[0]

if(v==null) return null

return colorScale(v,min,max)

}

})

layers[id].addTo(map)

}

async function loadVector(id,file){

if(layers[id]){

map.removeLayer(layers[id])
delete layers[id]
return

}

let res=await fetch("datos/"+file)

let data=await res.json()

layers[id]=L.geoJSON(data,{

style:{
color:"#ff5500",
weight:1
},

onEachFeature:function(feature,layer){

layer.bindPopup(JSON.stringify(feature.properties))

}

})

layers[id].addTo(map)

}

</script>

</body>
</html>
