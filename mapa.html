<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SP-ENERGY | Monitor SIG</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto',sans-serif;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
}

/* HEADER */

.main-header{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#222;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:3px solid #FFD700;
z-index:3000;
}

.logo{
font-weight:bold;
font-size:1.3rem;
}

.navbar ul{
display:flex;
gap:20px;
list-style:none;
}

.navbar a{
color:#ccc;
text-decoration:none;
font-size:0.9rem;
}

.navbar a.active{
color:#FFD700;
}

/* SIDEBAR */

#sidebar{
position:absolute;
top:60px;
left:0;
bottom:0;
width:320px;
background:white;
border-right:1px solid #ccc;
overflow-y:auto;
padding:15px;
z-index:2000;
}

/* MAPA */

#map{
position:absolute;
top:60px;
left:320px;
right:0;
bottom:0;
}

/* BLOQUES */

.control-block{
border:1px solid #ddd;
border-radius:5px;
padding:12px;
margin-bottom:15px;
}

.control-block h3{
font-size:0.8rem;
margin-bottom:10px;
border-bottom:2px solid #FFD700;
padding-bottom:5px;
}

/* CAPAS */

.layer-row{
display:flex;
align-items:center;
margin-bottom:10px;
gap:10px;
}

/* SLIDER */

.opacity-slider{
width:100%;
margin-bottom:15px;
}

/* LEYENDA */

.legend{
position:absolute;
bottom:20px;
right:20px;
background:white;
padding:10px;
border-radius:4px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
z-index:2000;
font-size:0.8rem;
display:none;
}

.legend-title{
font-weight:bold;
margin-bottom:5px;
}

.legend-gradient{
height:10px;
width:200px;
border:1px solid #ccc;
margin-bottom:3px;
}

.legend-numbers{
display:flex;
justify-content:space-between;
font-size:0.7rem;
}

/* INSPECTOR */

#inspector{
position:absolute;
top:10px;
right:20px;
width:220px;
background:white;
padding:10px;
border-left:5px solid #2c3e50;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
font-size:0.85rem;
z-index:1500;
}

</style>
</head>

<body>

<header class="main-header">

<div class="logo">SP-ENERGY ☀</div>

<nav class="navbar">
<ul>
<li><a href="#" class="active">Mapa</a></li>
</ul>
</nav>

</header>

<div id="sidebar">

<div class="control-block">

<h3>Variables Climáticas</h3>

<div class="layer-row">
<input type="checkbox" id="chkRad" onchange="toggleTif('rad','GHI_FINAL.tif')">
<label>Radiación Solar</label>
</div>

<input type="range" min="0" max="1" step="0.1" value="0.7"
class="opacity-slider"
oninput="setOpacity('rad',this.value)">

<div class="layer-row">
<input type="checkbox" id="chkPot" onchange="toggleTif('pot','PV_FINAL.tif')">
<label>Potencial FV</label>
</div>

<input type="range" min="0" max="1" step="0.1" value="0.7"
class="opacity-slider"
oninput="setOpacity('pot',this.value)">

<div class="layer-row">
<input type="checkbox" id="chkTemp" onchange="toggleTif('temp','TEMP.tif')">
<label>Temperatura</label>
</div>

<input type="range" min="0" max="1" step="0.1" value="0.7"
class="opacity-slider"
oninput="setOpacity('temp',this.value)">

</div>

<button onclick="map.fitBounds(boundsMX)"
style="width:100%;padding:10px;background:#2c3e50;color:white;border:none;border-radius:4px">
Centrar México
</button>

</div>

<div id="map"></div>

<div id="inspector">
<b>Inspector</b>
<div id="info">Activa una capa</div>
</div>

<div id="legend" class="legend">

<div class="legend-title" id="legendTitle"></div>

<div id="legendGradient" class="legend-gradient"></div>

<div class="legend-numbers">
<span id="legendMin"></span>
<span id="legendMax"></span>
</div>

</div>

<script>

const boundsMX=[[13,-118],[33,-86]]

const map=L.map('map',{
center:[23.6,-102.5],
zoom:5
})

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
).addTo(map)

const layers={}

/* TRANSPARENCIA */

function setOpacity(id,val){

if(layers[id]){
layers[id].setOpacity(val)
}

}

/* LEYENDA */

function showLegend(type){

const legend=document.getElementById("legend")
const title=document.getElementById("legendTitle")
const grad=document.getElementById("legendGradient")
const min=document.getElementById("legendMin")
const max=document.getElementById("legendMax")

legend.style.display="block"

if(type==="rad"){

title.innerText="Radiación GHI"
grad.style.background="linear-gradient(to right,#ffffb2,#fecc5c,#fd8d3c,#f03b20,#bd0026)"
min.innerText="0"
max.innerText="2300 kWh"

}

if(type==="pot"){

title.innerText="Potencial FV"
grad.style.background="linear-gradient(to right,#440154,#3b528b,#21918c,#5ec962,#fde725)"
min.innerText="3.0"
max.innerText="5.8"

}

if(type==="temp"){

title.innerText="Temperatura"
grad.style.background="linear-gradient(to right,#4575b4,#ffffbf,#d7301f)"
min.innerText="-2°C"
max.innerText="30°C"

}

}

/* CARGAR TIF */

async function toggleTif(id,file){

const chk=document.getElementById(
id==="rad"?"chkRad":
id==="pot"?"chkPot":
"chkTemp"
)

if(layers[id]){

chk.checked?layers[id].addTo(map):map.removeLayer(layers[id])
return

}

if(chk.checked){

let res=await fetch("datos/"+file)
const buf=await res.arrayBuffer()

const georaster=await parseGeoraster(buf)

let colorFn

if(id==="rad"){

colorFn=v=>{

if(v<100)return null

return v>2200?"#800026":
v>1900?"#bd0026":
v>1600?"#e31a1c":
v>1300?"#fc4e2a":
v>1000?"#fd8d3c":
"#feb24c"

}

}

if(id==="pot"){

colorFn=v=>{

if(v<1)return null

return v>5.2?"#fde725":
v>4.8?"#5ec962":
v>4.4?"#21918c":
v>4.0?"#3b528b":
"#440154"

}

}

if(id==="temp"){

colorFn=v=>{

if(v<-50)return null

return v>28?"#d73027":
v>24?"#fc8d59":
v>20?"#fee090":
v>15?"#e0f3f8":
v>10?"#91bfdb":
"#4575b4"

}

}

layers[id]=new GeoRasterLayer({

georaster:georaster,
opacity:0.7,
resolution:256,
pixelValuesToColorFn:vals=>colorFn(vals[0])

})

layers[id].addTo(map)

showLegend(id)

}

}

</script>

</body>
</html>
