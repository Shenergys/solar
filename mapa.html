<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP-ENERGY | Plataforma SIG</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<style>

body{
margin:0;
font-family:Roboto;
}

header{
height:60px;
background:#111;
color:white;
display:flex;
align-items:center;
padding-left:20px;
border-bottom:3px solid #FFD700;
}

#sidebar{
position:absolute;
top:60px;
left:0;
bottom:0;
width:300px;
background:#f4f4f4;
border-right:1px solid #ccc;
padding:15px;
overflow:auto;
}

#map{
position:absolute;
top:60px;
left:300px;
right:0;
bottom:0;
}

.layer{
margin-bottom:8px;
}

.legend{
position:absolute;
bottom:20px;
right:20px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.gradient{
width:200px;
height:10px;
background:linear-gradient(to right,blue,cyan,green,yellow,orange,red);
}

.opacity-control{
margin-top:10px;
}

</style>
</head>

<body>

<header>
SP-ENERGY ☀ Plataforma SIG
</header>

<div id="sidebar">

<h3>Capas climáticas</h3>

<div class="layer">
<input type="checkbox" onclick="toggleLayer('ghi')"> Radiación solar
</div>

<div class="layer">
<input type="checkbox" onclick="toggleLayer('pv')"> Potencial FV
</div>

<div class="layer">
<input type="checkbox" onclick="toggleLayer('temp')"> Temperatura
</div>

<hr>

<h3>Infraestructura</h3>

<div class="layer">
<input type="checkbox" onclick="loadVector('reg','datos/mis_9_regiones.json')"> Regiones
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('line','datos/lineas_transmision_cfe_24.json')"> Líneas transmisión
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('sub','datos/subestaciones_cfe.json')"> Subestaciones
</div>

<hr>

<h3>Restricciones</h3>

<div class="layer">
<input type="checkbox" onclick="loadVector('anp','datos/232_ANP-ITRF08_04072025.json')"> ANP
</div>

<div class="layer">
<input type="checkbox" onclick="loadVector('hidro','datos/hidro4mgw.json')"> Hidrología
</div>

<div class="opacity-control">
<label>Opacidad raster</label>
<input type="range" min="0" max="1" step="0.1" value="0.7" onchange="setOpacity(this.value)">
</div>

</div>

<div id="map"></div>

<div class="legend">
<b>Escala raster</b>
<div class="gradient"></div>
</div>

<script>

const map=L.map('map').setView([23,-102],5)

const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
const carto=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png')

L.control.layers({"OSM":osm,"Carto":carto}).addTo(map)

L.control.scale().addTo(map)

L.control.measure({
primaryLengthUnit:'kilometers',
primaryAreaUnit:'sqkilometers'
}).addTo(map)

const mexicoBounds=[[14,-118],[33,-86]]

const centerBtn=L.control({position:'topleft'})
centerBtn.onAdd=function(){
let btn=L.DomUtil.create('button')
btn.innerHTML="⤢"
btn.title="Centrar México"
btn.style.background="white"
btn.style.padding="6px"
btn.onclick=()=>map.fitBounds(mexicoBounds)
return btn
}
centerBtn.addTo(map)

const rasterLayers={
ghi:L.tileLayer('tiles/ghi/{z}/{x}/{y}.png',{opacity:0.7}),
pv:L.tileLayer('tiles/pv/{z}/{x}/{y}.png',{opacity:0.7}),
temp:L.tileLayer('tiles/temp/{z}/{x}/{y}.png',{opacity:0.7})
}

const vectorLayers={}

function toggleLayer(id){

if(map.hasLayer(rasterLayers[id])){
map.removeLayer(rasterLayers[id])
}else{
rasterLayers[id].addTo(map)
}

}

function setOpacity(v){
Object.values(rasterLayers).forEach(l=>l.setOpacity(v))
}

async function loadVector(id,url){

if(vectorLayers[id]){
map.removeLayer(vectorLayers[id])
delete vectorLayers[id]
return
}

let res=await fetch(url)
let data=await res.json()

if(id==='sub'){

let cluster=L.markerClusterGroup()

L.geoJSON(data,{
pointToLayer:(f,latlng)=>L.marker(latlng),
onEachFeature:(f,l)=>l.bindPopup(JSON.stringify(f.properties))
}).eachLayer(l=>cluster.addLayer(l))

vectorLayers[id]=cluster

}else{

vectorLayers[id]=L.geoJSON(data,{
style:{
color:"#FFD700",
weight:2,
fillOpacity:0.1
},
onEachFeature:(f,l)=>l.bindPopup(JSON.stringify(f.properties))
})

}

vectorLayers[id].addTo(map)

}

</script>

</body>
</html>
