<!DOCTYPE html>

<style>

/* asegura que el mapa siempre tenga tamaño */
html,body{
height:100%;
margin:0;
}

position:absolute;

</style>

</head>

<body>

<header class="main-header">

<nav class="navbar">

</ul>

</header>


<div id="sidebar">

<h3>Capas climáticas</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleTif('ghi','GHI_FINAL.tif')"> Radiación solar
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleTif('pv','PV_FINAL.tif')"> Potencial FV
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleTif('temp','TEMP.tif')"> Temperatura
</div>

<hr>

<h3>Infraestructura eléctrica</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('reg','mis_9_regiones.json')"> Regiones
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('tx','lineas_transmision_cfe_24.json')"> Líneas transmisión
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('sub','subestaciones_cfe.json')"> Subestaciones
</div>

<hr>

<h3>Restricciones</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('anp','232_ANP-ITRF08_04072025.json')"> ANP
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('hidro','hidro4mgw.json')"> Hidrología
</div>

</div>

<div id="map"></div>

<div id="legend">
<b>Escala raster</b>
<div style="height:10px;width:200px;background:linear-gradient(to right,blue,cyan,green,yellow,orange,red)"></div>
</div>


<script>

const map=L.map('map').setView([23.6,-102.5],5)

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{attribution:'© OpenStreetMap'}
).addTo(map)

L.control.scale().addTo(map)

L.control.measure({
primaryLengthUnit:'kilometers',
primaryAreaUnit:'sqkilometers'
}).addTo(map)

const layers={}

function getColor(v,min,max){

let ratio=(v-min)/(max-min)

let r=Math.floor(255*ratio)
let b=Math.floor(255*(1-ratio))

return `rgb(${r},120,${b})`

}

async function toggleTif(id,file){

if(layers[id]){
map.removeLayer(layers[id])
delete layers[id]
return
}

let res=await fetch("datos/"+file)
let buf=await res.arrayBuffer()
let raster=await parseGeoraster(buf)

let min=raster.mins[0]
let max=raster.maxs[0]

layers[id]=new GeoRasterLayer({
georaster:raster,
opacity:0.7,
resolution:256,
pixelValuesToColorFn:function(pixel){
let v=pixel[0]
if(v===null) return null
return getColor(v,min,max)
}
})

layers[id].addTo(map)
map.fitBounds(layers[id].getBounds())

}

async function toggleVector(id,file){

if(layers[id]){
map.removeLayer(layers[id])
delete layers[id]
return
}

let res=await fetch("datos/"+file)
let data=await res.json()

layers[id]=L.geoJSON(data,{
style:{
color:"#FFD700",
weight:2,
fillOpacity:0.15
},
onEachFeature:(f,l)=>l.bindPopup(JSON.stringify(f.properties))
})

layers[id].addTo(map)

}

</script>

</body>
</html>
