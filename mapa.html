<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP-Energy | Monitor SIG</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
overflow:hidden;
height:100vh;
}

.main-header{
height:60px;
background:#222;
color:white;
display:flex;
align-items:center;
padding:0 20px;
justify-content:space-between;
border-bottom:3px solid #FFD700;
position:fixed;
top:0;
width:100%;
z-index:3000;
}

.logo-text{
font-weight:bold;
font-size:1.4rem;
}

.navbar ul{
display:flex;
gap:20px;
list-style:none;
}

.navbar a{
color:#ccc;
text-decoration:none;
font-size:0.9rem;
}

.navbar a.active{
color:#FFD700;
}

#sidebar{
position:absolute;
top:60px;
bottom:0;
left:0;
width:320px;
background:#fdfdfd;
border-right:1px solid #ccc;
overflow-y:auto;
padding:15px;
}

#map{
position:absolute;
top:60px;
bottom:0;
left:320px;
right:0;
}

.control-block{
background:white;
border:1px solid #ddd;
border-radius:5px;
padding:10px;
margin-bottom:15px;
}

.control-block h3{
margin:0 0 10px 0;
font-size:0.9rem;
border-bottom:2px solid #FFD700;
padding-bottom:5px;
}

.layer-row{
display:flex;
align-items:center;
margin-bottom:8px;
}

.layer-row input{
margin-right:8px;
}

#legend{
position:absolute;
bottom:20px;
right:20px;
background:white;
padding:10px;
border-radius:4px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
display:none;
z-index:2000;
}

</style>
</head>

<body>

<header class="main-header">

<div class="logo-text">SP-ENERGY ☀️</div>

<nav class="navbar">
<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="mapa.html" class="active">Mapas</a></li>
<li><a href="graficas.html">Gráficas</a></li>
<li><a href="emisiones.html">Emisiones</a></li>
<li><a href="info.html">Contacto</a></li>
</ul>
</nav>

</header>


<div id="sidebar">

<div class="control-block">

<h3>Variables Climáticas</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleTif('rad','GHI_FINAL.tif')">
<label>Radiación</label>
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleTif('pot','PV_FINAL.tif')">
<label>Potencial FV</label>
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleTif('temp','TEMP.tif')">
<label>Temperatura</label>
</div>

</div>


<div class="control-block">

<h3>Infraestructura CFE</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('reg','mis_9_regiones.json')">
<label>Regiones</label>
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('tx','lineas_transmision_cfe_24.json')">
<label>Líneas</label>
</div>

</div>

</div>


<div id="map"></div>


<div id="legend">

<div id="legendTitle"></div>

<div style="
height:10px;
width:200px;
background:linear-gradient(to right,blue,cyan,green,yellow,red)">
</div>

</div>



<script>

const map=L.map('map').setView([23.6,-102.5],5)

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map)

const layers={}


function getColor(value,min,max){

let ratio=(value-min)/(max-min)

let r=Math.floor(255*ratio)
let g=Math.floor(255*(1-ratio))
let b=150

return `rgb(${r},${g},${b})`

}



async function toggleTif(id,file){

if(layers[id]){

map.removeLayer(layers[id])
delete layers[id]
document.getElementById("legend").style.display="none"
return

}

try{

let res=await fetch("datos/"+file)

if(!res.ok) throw new Error("Archivo no encontrado")

const buf=await res.arrayBuffer()

const georaster=await parseGeoraster(buf)

let min=georaster.mins[0]
let max=georaster.maxs[0]

layers[id]=new GeoRasterLayer({

georaster:georaster,

opacity:0.75,

pixelValuesToColorFn:function(pixelValues){

const value=pixelValues[0]

if(value===null) return null

return getColor(value,min,max)

},

resolution:256

})

layers[id].addTo(map)

map.fitBounds(layers[id].getBounds())

document.getElementById("legend").style.display="block"

}catch(err){

alert("Error cargando "+file)

console.error(err)

}

}



async function toggleVector(id,file){

if(layers[id]){

map.removeLayer(layers[id])
delete layers[id]
return

}

try{

let res=await fetch("datos/"+file)

const data=await res.json()

layers[id]=L.geoJSON(data,{

style:{
color:"#ff7800",
weight:2,
fillOpacity:0.1
},

onEachFeature:function(feature,layer){

if(feature.properties){

layer.bindPopup(JSON.stringify(feature.properties))

}

}

})

layers[id].addTo(map)

map.fitBounds(layers[id].getBounds())

}catch(err){

alert("Error cargando "+file)

console.error(err)

}

}

</script>

</body>
</html>
