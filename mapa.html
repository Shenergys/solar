<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SP-Energy | Mapas</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-measure/dist/leaflet-measure.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-measure/dist/leaflet-measure.js"></script>

<style>

/* SOLO asegura que el mapa tenga tamaño correcto */

html,body{
height:100%;
margin:0;
}

#sidebar{
position:absolute;
top:60px;
left:0;
bottom:0;
width:320px;
overflow:auto;
padding:15px;
}

#map{
position:absolute;
top:60px;
left:320px;
right:0;
bottom:0;
}

.layer-row{
margin-bottom:6px;
}

</style>

</head>


<body>

<header class="main-header">

<div class="logo-text">SP-ENERGY ☀️</div>

<nav class="navbar">
<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="mapa.html" class="active">Mapas</a></li>
<li><a href="graficas.html">Gráficas</a></li>
<li><a href="emisiones.html">Emisiones</a></li>
<li><a href="info.html">Contacto</a></li>
</ul>
</nav>

</header>


<div id="sidebar">

<h3>Capas climáticas</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleRaster('ghi','GHI_FINAL.tif')"> Radiación solar
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleRaster('pv','PV_FINAL.tif')"> Potencial FV
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleRaster('temp','TEMP.tif')"> Temperatura
</div>

<hr>

<h3>Infraestructura eléctrica</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('reg','mis_9_regiones.json')"> Regiones
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('tx','lineas_transmision_cfe_24.json')"> Líneas transmisión
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('sub','subestaciones_cfe.json')"> Subestaciones
</div>

<hr>

<h3>Restricciones</h3>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('anp','232_ANP-ITRF08_04072025.json')"> ANP
</div>

<div class="layer-row">
<input type="checkbox" onchange="toggleVector('hidro','hidro4mgw.json')"> Hidrología
</div>

</div>


<div id="map"></div>


<script>

const map=L.map('map').setView([23.5,-102],5)

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{attribution:'© OpenStreetMap'}
).addTo(map)

L.control.scale().addTo(map)

L.control.measure({
primaryLengthUnit:'kilometers',
primaryAreaUnit:'sqkilometers'
}).addTo(map)

const layers={}

function rasterColor(v,min,max){

let r=(v-min)/(max-min)

let red=Math.floor(255*r)
let blue=Math.floor(255*(1-r))

return `rgb(${red},120,${blue})`

}


async function toggleRaster(id,file){

if(layers[id]){
map.removeLayer(layers[id])
delete layers[id]
return
}

let res=await fetch("datos/"+file)
let buf=await res.arrayBuffer()

let raster=await parseGeoraster(buf)

let min=raster.mins[0]
let max=raster.maxs[0]

layers[id]=new GeoRasterLayer({

georaster:raster,
opacity:0.7,
resolution:256,

pixelValuesToColorFn:function(pixel){

let v=pixel[0]

if(v===null) return null

return rasterColor(v,min,max)

}

})

layers[id].addTo(map)

map.fitBounds(layers[id].getBounds())

}


async function toggleVector(id,file){

if(layers[id]){
map.removeLayer(layers[id])
delete layers[id]
return
}

let res=await fetch("solar/datos/"+file)
let data=await res.json()

if(id==="sub"){

let cluster=L.markerClusterGroup()

L.geoJSON(data,{
pointToLayer:(f,latlng)=>
L.circleMarker(latlng,{
radius:3,
fillColor:"#0077cc",
color:"#ffffff",
weight:0.5,
fillOpacity:0.9
}),
onEachFeature:(f,l)=>l.bindPopup(JSON.stringify(f.properties))
}).eachLayer(l=>cluster.addLayer(l))

layers[id]=cluster

}

else{

layers[id]=L.geoJSON(data,{
style:{
color:"#444",
weight:1,
fillOpacity:0.05
},
onEachFeature:(f,l)=>l.bindPopup(JSON.stringify(f.properties))
})

}

layers[id].addTo(map)

}

</script>

</body>
</html>
